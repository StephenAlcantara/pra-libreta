<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Sans 3',sans-serif;transition:background .3s,color .3s}
body.light{background:#fff;color:#2D3748}
body.dark{background:#141824;color:rgba(255,255,255,0.87)}
input,select,textarea{font-family:inherit}
button{cursor:pointer;font-family:inherit}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(32px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
.fade-in{animation:fadeIn .4s ease both}
.slide-up{animation:slideUp .45s ease both}
.spin{animation:spin 1s linear infinite}
.pulse{animation:pulse 1.5s ease infinite}
.btn-primary{background:#E8730A;color:white;border:none;border-radius:10px;font-size:16px;font-weight:700;padding:14px 28px;min-height:52px;transition:background .2s,transform .1s,box-shadow .2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 2px 8px rgba(232,115,10,.25)}
.btn-primary:hover{background:#F08030;box-shadow:0 4px 14px rgba(232,115,10,.35)}
.btn-primary:active{transform:scale(.97)}
.btn-primary:disabled{background:#9AA5B4;cursor:not-allowed;box-shadow:none}
.btn-ghost{background:transparent;border:1.5px solid #E4E8EE;border-radius:10px;font-size:15px;font-weight:600;padding:10px 18px;min-height:44px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:7px;color:#4A5568}
.btn-ghost:hover{border-color:#E8730A;color:#E8730A;background:#FFF5E6}
.btn-claim{background:#E6F4EC;color:#1A7A4A;border:2px solid #1A7A4A;border-radius:10px;font-size:15px;font-weight:700;padding:12px 22px;min-height:48px;transition:all .2s;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.btn-claim:hover{background:#1A7A4A;color:white}
.form-input{width:100%;padding:12px 16px;font-size:16px;border:1.5px solid #E4E8EE;border-radius:10px;background:white;color:#2D3748;transition:border-color .2s,box-shadow .2s;min-height:48px}
.form-input:focus{outline:none;border-color:#E8730A;box-shadow:0 0 0 3px rgba(232,115,10,.15)}
.form-input.error{border-color:#C0392B}
.form-label{font-size:14px;font-weight:600;color:#2D3748;margin-bottom:6px;display:block}
.form-error{font-size:13px;color:#C0392B;margin-top:5px;font-weight:500;display:flex;align-items:center;gap:4px}
.form-hint{font-size:13px;color:#4A5568;margin-top:5px}
.card{background:white;border-radius:14px;border:1px solid #E4E8EE;box-shadow:0 1px 8px rgba(10,37,64,.06);overflow:hidden}
.benefit-card{transition:transform .2s,box-shadow .2s,border-color .2s}
.benefit-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(10,37,64,.1);border-color:#E8730A}
.carousel-btn{background:white;border:1.5px solid #E4E8EE;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.carousel-btn:hover{border-color:#E8730A;color:#E8730A;background:#FFF5E6}
.carousel-btn:disabled{opacity:.3;cursor:not-allowed}
body.dark .form-input{background:#242938;color:rgba(255,255,255,.87);border-color:rgba(255,255,255,.1)}
body.dark .form-label{color:rgba(255,255,255,.87)}
body.dark .form-hint{color:rgba(255,255,255,.55)}
body.dark .card{background:#242938;border-color:rgba(255,255,255,.1)}
body.dark .btn-ghost{border-color:rgba(255,255,255,.1);color:rgba(255,255,255,.6)}
body.dark .btn-ghost:hover{border-color:#E8730A;color:#E8730A;background:rgba(232,115,10,.15)}
body.dark .carousel-btn{background:#242938;border-color:rgba(255,255,255,.1)}
body.dark .carousel-btn:hover{border-color:#E8730A;color:#E8730A;background:rgba(232,115,10,.15)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#E4E8EE;border-radius:6px}
body.dark ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12)}
</style>

function RegistrationPage({onComplete,C,onBack}){

  const v1=()=>{const e={};if(!form.firstName.trim())e.firstName="First name is required.";if(!form.lastName.trim())e.lastName="Last name is required.";if(!form.dob)e.dob="Date of birth is required.";else{const age=Math.floor((Date.now()-new Date(form.dob))/(1000*60*60*24*365.25));if(age<60)e.dob=`You must be at least 60. Calculated age: ${age}.`;}if(!form.province.trim())e.province="Province is required.";if(!form.city.trim())e.city="City/Municipality is required.";if(!form.mobile.trim())e.mobile="Mobile number is required.";else if(!/^(09|\+639)\d{9}$/.test(form.mobile.replace(/\s/g,"")))e.mobile="Enter a valid PH mobile (e.g. 09171234567).";setErrors(e);return Object.keys(e).length===0;};
  const v2=()=>{const e={};if(!form.praId.trim())e.praId="PRA ID is required.";else if(form.praId.trim().length<6)e.praId="PRA ID must be at least 6 characters.";setErrors(e);return Object.keys(e).length===0;};
  const v3=()=>{const e={};if(!form.email.trim())e.email="Email is required.";else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email))e.email="Enter a valid email.";if(!form.password)e.password="Password is required.";else if(form.password.length<8)e.password="Password must be at least 8 characters.";if(form.password!==form.confirmPassword)e.confirmPassword="Passwords do not match.";setErrors(e);return Object.keys(e).length===0;};
  const next=()=>{let ok=false;if(step===1)ok=v1();else if(step===2)ok=v2();else if(step===3){ok=v3();if(ok){const age=Math.floor((Date.now()-new Date(form.dob))/(1000*60*60*24*365.25));onComplete({...form,age,praId:form.praId.trim().toUpperCase()});return;}}if(ok)setStep(s=>s+1);};

            </div>

          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:20,gap:12}}>

          <div style={{textAlign:"right"}}><div style={{fontSize:12,color:"rgba(255,255,255,0.5)",marginBottom:4}}>Vouchers</div><div style={{fontSize:20,fontWeight:800,color:"#F08030"}}>{purchasedVouchers.length}</div></div>
        </div>
        {purchasedVouchers.length>0&&<div style={{marginTop:12,display:"flex",gap:3,alignItems:"flex-end",height:28}}>{sparkData.map((d,i)=><div key={i} style={{flex:1,borderRadius:2,background:d.v>0?"rgba(240,128,48,0.8)":"rgba(255,255,255,0.1)",height:d.v>0?`${Math.max(4,(d.v/sparkMax)*24)}px`:"4px"}}/> )}</div>}
      </div>
      <ProfileChecklist member={member} memberPhoto={memberPhoto||null} purchasedVouchers={purchasedVouchers||[]} claimedIds={claimedIds||[]} lang={lang||"en"} onNavigate={onNavigate} C={C}/>
      <PointsBadge points={points||0} C={C}/>
      <div style={{display:"flex",gap:10,marginBottom:20}}>
        <button className="btn-ghost" style={{flex:1,fontSize:13}} onClick={onShowID}><Icon name="BadgeCheck" size={15} color="currentColor"/> {t.downloadID}</button>
        <button className="btn-ghost" style={{flex:1,fontSize:13}} onClick={()=>onNavigate("vouchers")}><Icon name="Wallet" size={15} color="currentColor"/> My Vouchers</button>
      </div>
      {announcements.length>0&&(
        <div style={{marginBottom:24}}>

          <div style={{display:"flex",flexDirection:"column",gap:10}}>
            {announcements.slice(0,3).map(ann=>(
              <div key={ann.id} className="card" style={{padding:"14px 18px"}}>
                <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10,marginBottom:6}}><div style={{fontSize:14,fontWeight:700,color:C.text,lineHeight:1.3}}>{ann.title}</div><AnnBadge type={ann.type}/></div>
                <div style={{fontSize:13,color:C.textSub,lineHeight:1.6,marginBottom:4}}>{ann.body}</div>
                <div style={{fontSize:11,color:C.textSub,display:"flex",alignItems:"center",gap:4}}><Icon name="Clock" size={11} color={C.textSub}/>{ann.date}</div>
              </div>
            ))}
          </div>
        </div>
      )}
      <div className="card fade-in" style={{padding:"18px 20px",marginBottom:24,border:"1.5px dashed #E8730A",background:C.orangePale}}>
        <div style={{display:"flex",gap:12,alignItems:"center"}}>
          <div style={{width:44,height:44,borderRadius:12,background:"#E8730A",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name="Gift" size={20} color="white"/></div>
          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:C.text}}>{t.referAFriend}</div><div style={{fontSize:12,color:C.textSub,marginTop:2}}>{t.referDesc}</div></div>
          <button onClick={()=>{const code=member.praId.replace(/[^A-Z0-9]/g,"").slice(-6);const text=`Join PRA Retirement Benefits with my referral code: PRA-${code}\nhttps://pra.gov.ph/benefits`;if(navigator.share){navigator.share({title:"Join PRA Benefits",text});}else{navigator.clipboard&&navigator.clipboard.writeText(text);}alert(`Referral code PRA-${code} copied! Share with a friend.`);}} className="btn-primary" style={{fontSize:13,padding:"9px 14px",minHeight:36,flexShrink:0}}><Icon name="Share2" size={14} color="white"/> Share</button>
        </div>
        <div style={{marginTop:12,background:"rgba(255,255,255,0.6)",borderRadius:8,padding:"8px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:C.textSub}}>Your referral code</span><span style={{fontFamily:"monospace",fontSize:14,fontWeight:800,color:"#E8730A",letterSpacing:2}}>PRA-{member.praId.replace(/[^A-Z0-9]/g,"").slice(-6)}</span></div>
      </div>
      <div style={{marginBottom:24}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
          <div style={{fontSize:17,fontWeight:700,color:C.text}}>{t.featuredBenefits}</div>
          <div style={{display:"flex",gap:6,alignItems:"center"}}>
            <button className="carousel-btn" onClick={()=>setIdx(Math.max(0,idx-1))} disabled={idx===0}><Icon name="ChevronLeft" size={16} color="currentColor"/></button>
            <span style={{fontSize:12,color:C.textSub,minWidth:36,textAlign:"center"}}>{idx+1}/{featured.length}</span>
            <button className="carousel-btn" onClick={()=>setIdx(Math.min(featured.length-1,idx+1))} disabled={idx>=featured.length-1}><Icon name="ChevronRight" size={16} color="currentColor"/></button>
          </div>
        </div>
        <div style={{overflow:"hidden"}}><div style={{display:"flex",gap:14,transition:"transform .35s ease",transform:`translateX(calc(-${idx*100}% - ${idx*14}px))`}}>{featured.map(item=><div key={item.id} style={{minWidth:"100%"}}><BenefitCard item={item} onPurchase={onPurchase} onClaim={onClaim} claimed={claimedIds.includes(item.id)} C={C} onOpenModal={onOpenModal}/></div>)}</div></div>
        <div style={{display:"flex",justifyContent:"center",gap:6,marginTop:14}}>{featured.map((_,i)=><button key={i} onClick={()=>setIdx(i)} style={{width:i===idx?20:7,height:7,borderRadius:4,background:i===idx?"#E8730A":C.gray200,border:"none",transition:"all .25s",padding:0,cursor:"pointer"}}/>)}</div>
        <div style={{marginTop:14}}><button className="btn-ghost" style={{width:"100%",fontSize:14}} onClick={()=>onNavigate("benefits","all")}>{t.viewAll} <Icon name="ChevronRight" size={15} color="currentColor"/></button></div>
      </div>
      <div style={{marginBottom:8}}>
        <div style={{fontSize:17,fontWeight:700,color:C.text,marginBottom:14}}>{t.browseByCategory}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
          {[{label:"Health & Wellness",iconName:"Heart",cat:"health",lightBg:"#FEF2F2",darkBg:"rgba(231,76,60,0.12)"},{label:"Travel & Hotels",iconName:"Plane",cat:"travel",lightBg:"#EFF6FF",darkBg:"rgba(52,152,219,0.12)"},{label:"Food & Dining",iconName:"UtensilsCrossed",cat:"dining",lightBg:"#F0FDF4",darkBg:"rgba(39,174,96,0.12)"},{label:"Entertainment",iconName:"Film",cat:"entertainment",lightBg:"#FAF5FF",darkBg:"rgba(155,89,182,0.12)"}].map(q=>(
            <button key={q.cat} onClick={()=>onNavigate("benefits",q.cat)} style={{background:C.isDark?q.darkBg:q.lightBg,border:`1.5px solid ${C.border}`,borderRadius:14,padding:"18px 14px",cursor:"pointer",textAlign:"left",transition:"all .2s",display:"flex",flexDirection:"column",gap:8}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#E8730A";e.currentTarget.style.transform="translateY(-2px)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor=C.border;e.currentTarget.style.transform="translateY(0)";}}>
              <Icon name={q.iconName} size={26} color="#E8730A"/>
              <span style={{fontSize:14,fontWeight:700,color:C.text,lineHeight:1.2}}>{q.label}</span>
              <span style={{fontSize:12,color:C.textSub}}>{benefits.filter(b=>b.category===q.cat).length} offers</span>
            </button>
          ))}
        </div>
      </div>
      <div style={{marginTop:24,marginBottom:8}}><div style={{fontSize:17,fontWeight:700,color:C.text,marginBottom:14}}>{t.digitalCard}</div><PRACard member={member} C={C}/></div>
    </div>
  );
}

function BenefitsHub({member,initialCategory="all",onPurchase,C,onOpenModal,favorites=[],setFavorites,claimedIds=[],onClaim}){
  const[activeCategory,setActiveCategory]=useState(initialCategory);
  const[claimFeedback,setClaimFeedback]=useState(null);
  const[search,setSearch]=useState("");
  const[viewMode,setViewMode]=useState("list");
  const handleClaim=(item)=>{onClaim&&onClaim(item);setClaimFeedback(item.partner);setTimeout(()=>setClaimFeedback(null),3000);};
  const filtered=ALL_BENEFITS.filter(b=>{const mc=activeCategory==="all"||b.category===activeCategory;const ms=!search||b.title.toLowerCase().includes(search.toLowerCase())||b.partner.toLowerCase().includes(search.toLowerCase());return mc&&ms;});
  return(
    <div className="fade-in" style={{padding:"24px 18px"}}>
      <div style={{marginBottom:20}}><div style={{fontSize:24,fontWeight:700,color:C.text,fontFamily:"'Libre Baskerville',serif",marginBottom:2}}>Benefits &amp; Promos</div><div style={{color:C.textSub,fontSize:14}}>Exclusive offers for PRA Members</div></div>
      <div style={{position:"relative",marginBottom:18}}>
        <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",display:"flex",pointerEvents:"none"}}><Icon name="Search" size={16} color={C.textSub}/></span>
        <input className="form-input" value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search benefits, partners..." style={{paddingLeft:40,paddingRight:search?40:14}}/>
        {search&&<button onClick={()=>setSearch("")} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",display:"flex",padding:4,cursor:"pointer"}}><Icon name="X" size={15} color={C.textSub}/></button>}
      </div>
      <div style={{display:"flex",gap:0,marginBottom:16,borderRadius:8,overflow:"hidden",border:`1.5px solid ${C.border}`}}>
        {[{id:"list",icon:"LayoutDashboard",label:"List"},{id:"map",icon:"MapPin",label:"Map"}].map(v=>(
          <button key={v.id} onClick={()=>setViewMode(v.id)} style={{flex:1,background:viewMode===v.id?"#0A2540":C.surface,color:viewMode===v.id?"white":C.textSub,border:"none",padding:"9px 14px",fontSize:13,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:5,transition:"all .2s"}}>
            <Icon name={v.icon} size={14} color={viewMode===v.id?"white":C.textSub}/>{v.label}
          </button>
        ))}
      </div>
      {viewMode==="map"&&<BenefitsMapView benefits={filtered} onPurchase={onPurchase} onClaim={handleClaim} claimedIds={claimedIds} C={C} onOpenModal={onOpenModal}/>}
      {viewMode==="list"&&claimFeedback&&<div style={{background:"#E6F4EC",border:"1.5px solid #1A7A4A",borderRadius:10,padding:"12px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}><Icon name="CheckCircle" size={18} color="#1A7A4A"/><div><strong style={{color:"#1A7A4A",fontSize:14}}>Benefit Claimed!</strong><div style={{fontSize:13,color:"#2D3748",marginTop:1}}>Show your PRA Card at <strong>{claimFeedback}</strong> to avail this discount.</div></div></div>}
      {viewMode==="list"&&<div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:20}}>
        {CATEGORIES.map(c=><button key={c.id} onClick={()=>setActiveCategory(c.id)} style={{background:activeCategory===c.id?"#0A2540":C.surface,color:activeCategory===c.id?"white":C.textSub,border:`1.5px solid ${activeCategory===c.id?"#0A2540":C.border}`,borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:600,whiteSpace:"nowrap",transition:"all .2s",display:"flex",alignItems:"center",gap:6,minHeight:40,cursor:"pointer"}}><Icon name={c.iconName} size={14} color={activeCategory===c.id?"white":C.textSub}/>{c.label}</button>)}
      </div>}
      {viewMode==="list"&&(filtered.length===0?<div style={{textAlign:"center",padding:"48px 24px",color:C.textSub}}><div style={{display:"flex",justifyContent:"center",marginBottom:12,opacity:.4}}><Icon name="Search" size={36} color={C.textSub}/></div><div style={{fontSize:16,fontWeight:600}}>No results found</div><div style={{fontSize:14,marginTop:4}}>Try a different search or category</div></div>:<div style={{display:"flex",flexDirection:"column",gap:16}}>{filtered.map(item=><BenefitCard key={item.id} item={item} onPurchase={onPurchase} onClaim={handleClaim} claimed={claimedIds.includes(item.id)} C={C} onOpenModal={onOpenModal} favorited={favorites.includes(item.id)} onFavorite={()=>setFavorites&&setFavorites(fs=>fs.includes(item.id)?fs.filter(x=>x!==item.id):[...fs,item.id])}/>)}</div>)}
    </div>
  );
}

function CheckoutPage({item,member,onSuccess,onBack,C,bookingDates,setBookingDates}){
  const[payMethod,setPayMethod]=useState(null);
  const[cardNum,setCardNum]=useState("");const[cardName,setCardName]=useState("");const[cardExp,setCardExp]=useState("");const[cardCvv,setCardCvv]=useState("");
  const[otpInput,setOtpInput]=useState("");const[otpSent,setOtpSent]=useState(false);const[processing,setProcessing]=useState(false);const[otpError,setOtpError]=useState("");const[errors,setErrors]=useState({});
  const finalPrice=calcFinal(item)||item.originalPrice;
  const discount=item.originalPrice?item.originalPrice-finalPrice:0;
  const handlePay=()=>{const e={};if(!payMethod){alert("Please select a payment method.");return;}if((payMethod==="gcash"||payMethod==="maya")&&!otpSent){alert("Please request and enter your OTP first.");return;}if((payMethod==="gcash"||payMethod==="maya")&&otpInput!=="123456"){setOtpError("Incorrect OTP. For this demo, use: 123456");return;}if(payMethod==="card"){if(!cardNum||cardNum.replace(/\s/g,"").length<12)e.cardNum="Enter a valid card number.";if(!cardName.trim())e.cardName="Cardholder name is required.";if(!cardExp)e.cardExp="Expiry date is required.";if(!cardCvv||cardCvv.length<3)e.cardCvv="Enter a valid CVV.";}if(Object.keys(e).length>0){setErrors(e);return;}setProcessing(true);setTimeout(()=>{setProcessing(false);onSuccess({item,payMethod,voucher:genVoucher(),amount:finalPrice});},2500);};
  const fmtCard=v=>v.replace(/\D/g,"").slice(0,16).replace(/(.{4})/g,"$1 ").trim();
  const Err=({field})=>errors[field]?<div className="form-error"><Icon name="AlertCircle" size={12} color="#C0392B"/> {errors[field]}</div>:null;
  return(
    <div className="fade-in" style={{padding:"24px 18px"}}>
      <button onClick={onBack} style={{background:"none",border:"none",color:"#E8730A",fontSize:14,fontWeight:700,marginBottom:18,display:"flex",alignItems:"center",gap:6,padding:0,cursor:"pointer"}}><Icon name="ArrowLeft" size={16} color="#E8730A"/> Back to Benefits</button>
      <div style={{fontSize:20,fontWeight:700,color:C.text,fontFamily:"'Libre Baskerville',serif",marginBottom:2}}>Secure Your Voucher</div>
      <div style={{color:C.textSub,fontSize:14,marginBottom:22}}>Review your order and complete payment below.</div>
      <div className="card" style={{padding:"18px 20px",marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:14,paddingBottom:12,borderBottom:`1px solid ${C.border}`}}>Order Summary</div>
        <div style={{display:"flex",gap:12,marginBottom:14}}><div style={{width:42,height:42,borderRadius:10,background:C.orangePale,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name={item.iconName} size={20} color={item.iconColor}/></div><div><div style={{fontSize:15,fontWeight:700,color:C.text}}>{item.title}</div><div style={{fontSize:13,color:"#E8730A",fontWeight:600}}>{item.partner}</div></div></div>
        <div style={{background:C.gray50,borderRadius:10,padding:"12px 14px",border:`1px solid ${C.border}`}}>
          {item.originalPrice&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:C.textSub}}>Original Price</span><span style={{fontSize:13,color:C.textSub,textDecoration:"line-through"}}>{fmt(item.originalPrice)}</span></div>}
          {discount>0&&<div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:13,color:"#1A7A4A",fontWeight:600}}>PRA Discount {item.discountPct?`(${item.discountPct}%)`:""}</span><span style={{fontSize:13,color:"#1A7A4A",fontWeight:600}}>-{fmt(discount)}</span></div>}
          <div style={{display:"flex",justifyContent:"space-between",borderTop:`1px solid ${C.border}`,paddingTop:8,marginTop:4}}><span style={{fontSize:15,fontWeight:700,color:C.text}}>Total Amount</span><span style={{fontSize:18,fontWeight:800,color:"#E8730A"}}>{fmt(finalPrice)}</span></div>
        </div>
      </div>
      {item.category==="travel"&&<BookingCalendar onSelect={dates=>setBookingDates&&setBookingDates(d=>({...d,[item.id]:dates}))} selected={bookingDates&&bookingDates[item.id]} C={C}/>}
      <div className="card" style={{padding:"18px 20px",marginBottom:16}}>
        <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:14}}>Payment Method</div>
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {[{id:"gcash",label:"GCash",desc:"Pay via GCash wallet",iconName:"Smartphone",color:"#00B14F"},{id:"maya",label:"Maya",desc:"Pay via Maya e-wallet",iconName:"Smartphone",color:"#6B21C6"},{id:"card",label:"Credit / Debit Card",desc:"Visa, Mastercard, JCB",iconName:"CreditCard",color:"#1E4D7B"}].map(pm=>(
            <div key={pm.id} onClick={()=>{setPayMethod(pm.id);setOtpSent(false);setOtpInput("");setOtpError("");}} style={{border:`1.5px solid ${payMethod===pm.id?"#E8730A":C.border}`,borderRadius:12,padding:"14px 16px",display:"flex",alignItems:"center",gap:12,background:payMethod===pm.id?C.orangePale:C.surface,cursor:"pointer",transition:"all .2s"}}>
              <div style={{width:40,height:40,borderRadius:10,background:pm.color+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name={pm.iconName} size={20} color={pm.color}/></div>
              <div style={{flex:1}}><div style={{fontSize:15,fontWeight:700,color:C.text}}>{pm.label}</div><div style={{fontSize:13,color:C.textSub}}>{pm.desc}</div></div>
              <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${payMethod===pm.id?"#E8730A":C.gray400}`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{payMethod===pm.id&&<div style={{width:9,height:9,borderRadius:"50%",background:"#E8730A"}}/>}</div>
            </div>
          ))}
        </div>
      </div>
      {(payMethod==="gcash"||payMethod==="maya")&&(
        <div className="card fade-in" style={{padding:"18px 20px",marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:6}}>{payMethod==="gcash"?"GCash":"Maya"} Verification</div>
          <div style={{fontSize:14,color:C.textSub,marginBottom:14}}>A 6-digit OTP will be sent to <strong style={{color:C.text}}>{member.mobile}</strong>.</div>
          {!otpSent?<button className="btn-primary" style={{width:"100%",background:payMethod==="gcash"?"#00B14F":"#6B21C6"}} onClick={()=>setOtpSent(true)}><Icon name="Smartphone" size={16} color="white"/> Send OTP to {member.mobile}</button>:<><div style={{background:"#E6F4EC",border:"1px solid #1A7A4A",borderRadius:8,padding:10,marginBottom:14,fontSize:13,color:"#1A7A4A",fontWeight:600}}>OTP sent! Demo code: <strong>123456</strong></div><label className="form-label">Enter 6-Digit OTP</label><input className={`form-input${otpError?" error":""}`} value={otpInput} onChange={e=>{setOtpInput(e.target.value.replace(/\D/g,"").slice(0,6));setOtpError("");}} placeholder="- - - - - -" style={{fontSize:22,letterSpacing:10,textAlign:"center"}} maxLength={6}/>{otpError&&<div className="form-error"><Icon name="AlertCircle" size={12} color="#C0392B"/> {otpError}</div>}</>}
        </div>
      )}
      {payMethod==="card"&&(
        <div className="card fade-in" style={{padding:"18px 20px",marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:14}}>Card Details</div>
          <div style={{marginBottom:14}}><label className="form-label">Card Number</label><input className={`form-input${errors.cardNum?" error":""}`} value={cardNum} onChange={e=>setCardNum(fmtCard(e.target.value))} placeholder="1234 5678 9012 3456"/><Err field="cardNum"/></div>
          <div style={{marginBottom:14}}><label className="form-label">Cardholder Name</label><input className={`form-input${errors.cardName?" error":""}`} value={cardName} onChange={e=>setCardName(e.target.value)} placeholder="As printed on card"/><Err field="cardName"/></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}><div><label className="form-label">Expiry Date</label><input type="month" className={`form-input${errors.cardExp?" error":""}`} value={cardExp} onChange={e=>setCardExp(e.target.value)}/><Err field="cardExp"/></div><div><label className="form-label">CVV / CVC</label><input className={`form-input${errors.cardCvv?" error":""}`} value={cardCvv} onChange={e=>setCardCvv(e.target.value.replace(/\D/g,"").slice(0,4))} placeholder="..." style={{letterSpacing:4}}/><Err field="cardCvv"/></div></div>
        </div>
      )}
      <button className="btn-primary" style={{width:"100%",fontSize:17,padding:"16px 28px",minHeight:58}} onClick={handlePay} disabled={processing}>{processing?<><Spinner/> Processing Payment...</>:<><Icon name="Lock" size={16} color="white"/> Confirm Payment - {fmt(finalPrice)}</>}</button>
      <div style={{textAlign:"center",marginTop:12,fontSize:12,color:C.textSub,display:"flex",alignItems:"center",justifyContent:"center",gap:5}}><Icon name="Lock" size={12} color={C.textSub}/> Secured by PRA Digital Platform</div>
    </div>
  );
}


function PaymentSuccess({result,member,onDone,C,onViewVouchers,onRate}){

          <div style={{background:C.gray50,borderRadius:10,padding:"12px 14px",border:`1px solid ${C.border}`}}>

      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>

          <div style={{fontSize:13,color:C.textSub,marginBottom:12}}>Rate your experience with <strong>{result.item.partner}</strong></div>
          <div style={{display:"flex",gap:8,justifyContent:"center"}}>{[1,2,3,4,5].map(s=><button key={s} onClick={()=>{onRate&&onRate(result.item.id,s);setShowRating(false);setRatingDone(s);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:28,lineHeight:1,color:s<=(hoverStar||0)?"#F08030":"#D0D5DD",transition:"color .15s"}} onMouseEnter={()=>setHoverStar(s)} onMouseLeave={()=>setHoverStar(0)}>★</button>)}</div>
        </div>

function AdminAnalyticsChart({C}){
  const monthData=[{month:"Jan",amount:1200},{month:"Feb",amount:4500},{month:"Mar",amount:2100},{month:"Apr",amount:8900},{month:"May",amount:22878},{month:"Jun",amount:0}];
  const catData=[{cat:"Health",amount:6800,color:"#e74c3c"},{cat:"Travel",amount:15400,color:"#3498db"},{cat:"Dining",amount:578,color:"#27ae60"},{cat:"Cinema",amount:100,color:"#9b59b6"}];
  const maxAmt=Math.max(...monthData.map(d=>d.amount));
  const maxCat=Math.max(...catData.map(d=>d.amount));
  return(
    <div className="card" style={{padding:"20px 22px",marginBottom:20}}>
      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:18}}><Icon name="BarChart2" size={18} color="#E8730A"/><div style={{fontSize:15,fontWeight:700,color:C.text}}>Revenue Analytics</div></div>
      <div style={{fontSize:12,color:C.textSub,marginBottom:8,fontWeight:600}}>Monthly Revenue (PhP)</div>
      <div style={{display:"flex",gap:5,alignItems:"flex-end",height:80,marginBottom:18}}>{monthData.map((d,i)=><div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><div style={{width:"100%",borderRadius:"4px 4px 0 0",background:d.amount>0?"#E8730A":C.gray200,height:d.amount>0?`${Math.max(8,(d.amount/maxAmt)*72)}px`:"6px",transition:"height .5s ease"}} title={`PhP ${d.amount.toLocaleString()}`}/><span style={{fontSize:10,color:C.textSub,fontWeight:600}}>{d.month}</span></div>)}</div>
      <div style={{fontSize:12,color:C.textSub,marginBottom:10,fontWeight:600}}>By Category</div>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>{catData.map(d=><div key={d.cat} style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:56,fontSize:12,color:C.textSub,flexShrink:0}}>{d.cat}</div><div style={{flex:1,height:8,background:C.gray200,borderRadius:6,overflow:"hidden"}}><div style={{height:"100%",borderRadius:6,background:d.color,width:`${(d.amount/maxCat)*100}%`,transition:"width .8s ease"}}/></div><div style={{fontSize:12,fontWeight:700,color:C.text,minWidth:56,textAlign:"right"}}>PhP {(d.amount/1000).toFixed(1)}k</div></div>)}</div>
    </div>
  );
}

// ── Push Notification helper ──────────────────────────────────────────────────
function requestPushNotif(memberName){
  if(!("Notification" in window)){return;}
  Notification.requestPermission().then(perm=>{
    if(perm==="granted"){
      setTimeout(()=>{
        new Notification("PRA Libreta - New Benefit Added! 🎉",{
          body:`Hi ${memberName}! Robinsons Health Clinics is now a PRA Libreta partner. Tap to view discounted consultations.`,
          icon:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23E8730A'/><text y='.9em' font-size='80' x='10'>🏥</text></svg>",
        });
      }, 3500);
    }
  });
}

// ── SRRV Renewal Wizard ───────────────────────────────────────────────────────
function RenewalWizard({member,onClose,C}){

          <div style={{display:"flex",gap:6}}>{steps.map((_,i)=><div key={i} style={{flex:1,height:4,borderRadius:4,background:i<=step?"#E8730A":"rgba(255,255,255,0.2)",transition:"background .3s"}}/>)}</div>
          <div style={{marginTop:8,fontSize:12,color:"rgba(255,255,255,0.6)"}}>Step {step+1} of {steps.length} - {steps[step].title}</div>

            }
          </div>
        </div>
      </div>
    </div>
  );
}

// ── AI Chatbot ────────────────────────────────────────────────────────────────
function ChatBot({member,C,onClose}){
  const[messages,setMessages]=useState([{role:"assistant",text:`Hello ${member.firstName}! 👋 I'm your PRA Libreta assistant. I can answer questions about your SRRV, benefits, renewal process, and more. How can I help you today?`}]);
  const[input,setInput]=useState("");
  const[loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>{bottomRef.current?.scrollIntoView({behavior:"smooth"});},[messages]);
  const systemPrompt=`You are a helpful assistant for PRA Libreta, the digital benefits platform of the Philippine Retirement Authority (PRA). You help SRRV (Special Resident Retiree's Visa) holders navigate their benefits and answer questions about PRA programs.

The member you are assisting is: ${member.firstName} ${member.lastName}, PRA ID: ${member.praId}, Age: ${member.age}, from ${member.city}, ${member.province}.

Key facts:
- PRA was established in 1985 and manages the SRRV program for foreign retirees in the Philippines.
- SRRV holders enjoy tax-free pension remittances, no exit clearance needed, and multiple-entry privileges.
- The annual fee for SRRV is USD 360.
- Renewal must be done before expiry to avoid penalties.
- PRA Libreta benefits include discounts at health, travel, dining, and entertainment partners.
- For urgent matters: PRA main office at (02) 8526-3048, email info@pra.gov.ph.

Be concise, warm, and helpful. Answer in the language the user writes in (English or Filipino). Keep responses under 120 words unless a detailed list is needed.`;

  const send=async()=>{
    if(!input.trim()||loading)return;
    const userMsg=input.trim();
    setInput("");
    setMessages(m=>[...m,{role:"user",text:userMsg}]);
    setLoading(true);
    try{
      const history=messages.map(m=>({role:m.role==="assistant"?"assistant":"user",content:m.text}));
      // Check if running from file:// (local) vs hosted
      const isLocal=window.location.protocol==="file:";
      if(isLocal){
        // Simulate a helpful response in local/demo mode
        const demoReplies={
          "renew":"To renew your SRRV, start your application from the dashboard - tap the 'Start Renewal Application' button on the SRRV Visa Status card. You'll need your passport, ACR I-Card, annual fee receipt, and a medical certificate.",
          "expire":"You can check your visa expiry on the Home dashboard - the SRRV Visa Status card shows your exact expiry date and days remaining.",
          "benefit":"Browse all your PRA Libreta benefits in the Benefits tab. Tap 'Details' on any benefit to see partner info, location, and full terms before purchasing.",
          "voucher":"After purchasing, your vouchers are in the My Vouchers tab. Tap any voucher to expand it and show the QR code to the partner establishment.",
          "fee":"The annual SRRV membership fee is USD 360, payable directly to PRA. Contact PRA at (02) 8526-3048 or info@pra.gov.ph.",
          "points":"You earn 1 PRA Libreta Point for every PhP 100 spent on vouchers. Redeem 50 points for PhP 100 off your next purchase.",
          "contact":"PRA Head Office: (02) 8526-3048 | Email: info@pra.gov.ph | Address: Legazpi Towers 300, Roxas Blvd, Pasay City. Office hours: Mon-Fri, 8AM-5PM.",
        };
        const lower=userMsg.toLowerCase();
        let reply="I'm running in demo mode (local file). For a live AI response, host this app on a web server. In the meantime - ";
        for(const [key,resp] of Object.entries(demoReplies)){
          if(lower.includes(key)){reply=resp;break;}
        }
        if(reply.startsWith("I'm running")){reply+="you can browse the FAQ tab for answers to common questions, or contact PRA directly at (02) 8526-3048.";}
        setMessages(m=>[...m,{role:"assistant",text:reply}]);
        setLoading(false);
        return;
      }
      const res=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-5",
          max_tokens:300,
          system:systemPrompt,
          messages:[...history,{role:"user",content:userMsg}],
        })
      });
      const data=await res.json();
      const reply=data.content?.map(b=>b.text||"").join("")||"Sorry, I couldn't get a response. Please try again.";
      setMessages(m=>[...m,{role:"assistant",text:reply}]);
    }catch(e){
      setMessages(m=>[...m,{role:"assistant",text:"Sorry, I'm having trouble connecting right now. Please try again or contact PRA at (02) 8526-3048."}]);
    }
    setLoading(false);
  };
  const suggestions=["How do I renew my SRRV?","What documents do I need for renewal?","When does my visa expire?","How do I use my benefits?","What is the annual fee?"];
  return(
    <div style={{position:"fixed",bottom:90,right:16,width:340,maxWidth:"calc(100vw - 32px)",zIndex:300,display:"flex",flexDirection:"column",boxShadow:"0 8px 32px rgba(0,0,0,0.2)",borderRadius:16,overflow:"hidden",background:C.surface,border:`1.5px solid ${C.border}`}}>
      {/* Header */}
      <div style={{background:"linear-gradient(135deg,#0A2540,#1E4D7B)",padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,borderRadius:"50%",background:"rgba(232,115,10,0.2)",border:"2px solid #E8730A",display:"flex",alignItems:"center",justifyContent:"center"}}><Icon name="Sparkles" size={17} color="#E8730A"/></div>

// ─── Booking Calendar (for travel-type benefits) ──────────────────────────────
function BookingCalendar({onSelect,selected,C}){
  const today = new Date();
  const[viewYear,setViewYear] = useState(today.getFullYear());
  const[viewMonth,setViewMonth] = useState(today.getMonth());
  const[checkIn,setCheckIn] = useState(null);
  const[checkOut,setCheckOut] = useState(null);
  const monthNames=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const daysInMonth=(y,m)=>new Date(y,m+1,0).getDate();
  const firstDay=(y,m)=>new Date(y,m,1).getDay();
  const isToday=(d)=>d.toDateString()===today.toDateString();
  const isPast=(d)=>d<today&&!isToday(d);
  const isInRange=(d)=>checkIn&&checkOut&&d>checkIn&&d<checkOut;
  const isSelected=(d)=>(checkIn&&d.toDateString()===checkIn.toDateString())||(checkOut&&d.toDateString()===checkOut.toDateString());
  const handleDay=(d)=>{
    if(isPast(d))return;
    if(!checkIn||checkOut){setCheckIn(d);setCheckOut(null);}
    else if(d<=checkIn){setCheckIn(d);setCheckOut(null);}
    else{setCheckOut(d);onSelect&&onSelect({checkIn,checkOut:d});}
  };
  const prevMonth=()=>{if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}else setViewMonth(m=>m-1);};
  const nextMonth=()=>{if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}else setViewMonth(m=>m+1);};
  const fd=firstDay(viewYear,viewMonth);
  const dim=daysInMonth(viewYear,viewMonth);
  return(
    <div className="card" style={{padding:"16px 18px",marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12,display:"flex",alignItems:"center",gap:6}}><Icon name="Calendar" size={15} color="#E8730A"/> Select Travel Dates</div>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button onClick={prevMonth} className="carousel-btn" style={{width:30,height:30}}><Icon name="ChevronLeft" size={14} color="currentColor"/></button>
        <span style={{fontSize:14,fontWeight:700,color:C.text}}>{monthNames[viewMonth]} {viewYear}</span>
        <button onClick={nextMonth} className="carousel-btn" style={{width:30,height:30}}><Icon name="ChevronRight" size={14} color="currentColor"/></button>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:6}}>
        {["Su","Mo","Tu","We","Th","Fr","Sa"].map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:C.textSub,padding:"4px 0"}}>{d}</div>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
        {Array.from({length:fd}).map((_,i)=><div key={`e${i}`}/>)}
        {Array.from({length:dim}).map((_,i)=>{
          const d=new Date(viewYear,viewMonth,i+1);
          const past=isPast(d);
          const sel=isSelected(d);
          const range=isInRange(d);
          const tod=isToday(d);
          return(
            <button key={i} onClick={()=>handleDay(d)} disabled={past}
              style={{padding:"6px 2px",border:"none",borderRadius:6,cursor:past?"not-allowed":"pointer",fontSize:12,fontWeight:sel?700:400,
                background:sel?"#E8730A":range?"rgba(232,115,10,0.15)":tod?C.orangePale:"transparent",
                color:sel?"white":past?"#C0C0C0":tod?"#E8730A":C.text,
                transition:"all .15s"}}>
              {i+1}
            </button>
          );
        })}
      </div>
      {checkIn&&(
        <div style={{marginTop:12,padding:"10px 12px",background:C.gray50,borderRadius:8,border:`1px solid ${C.border}`,fontSize:13}}>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{color:C.textSub}}>Check-in</span>
            <span style={{fontWeight:700,color:C.text}}>{checkIn.toLocaleDateString("en-PH",{month:"short",day:"numeric",year:"numeric"})}</span>
          </div>
          {checkOut&&<div style={{display:"flex",justifyContent:"space-between",marginTop:4}}>
            <span style={{color:C.textSub}}>Check-out</span>
            <span style={{fontWeight:700,color:C.text}}>{checkOut.toLocaleDateString("en-PH",{month:"short",day:"numeric",year:"numeric"})}</span>
          </div>}
          {!checkOut&&<div style={{fontSize:12,color:"#E8730A",marginTop:4}}>Now select your check-out date</div>}
        </div>
      )}
    </div>
  );
}

// ─── ID Card Generator ────────────────────────────────────────────────────────
function IDCardModal({member,C,onClose,memberPhoto}){

    const seed=code.split("").reduce((a,c)=>a+c.charCodeAt(0),0);
    return Array.from({length:25},(_,r)=>Array.from({length:25},(_,c2)=>{
      const v=(seed*31+r*17+c2*13)%4;
      return v<2||(r<7&&c2<7&&r>0&&c2>0&&!(r>1&&r<5&&c2>1&&c2<5))||(r<7&&c2>17&&r>0&&c2<24&&!(r>1&&r<5&&c2>18&&c2<23))||(r>17&&c2<7&&r<24&&c2>0&&!(r>18&&r<22&&c2>1&&c2<5));
    }));
  };
  const qrGrid=makeQR(member.praId);

    const content=cardRef.current.innerHTML;
    const w=window.open("","_blank","width=400,height=650");

        {/* The card itself */}
        <div ref={cardRef} style={{background:"white",borderRadius:16,overflow:"hidden",boxShadow:"0 4px 20px rgba(0,0,0,0.15)",marginBottom:16}}>
          {/* Card header */}

            <div style={{fontSize:10,color:"rgba(255,255,255,0.5)",letterSpacing:2,textTransform:"uppercase"}}>Official Member Identification Card</div>
          </div>
          {/* Photo + info strip */}
          <div style={{padding:"16px 20px",display:"flex",gap:16,alignItems:"flex-start",borderBottom:"1px solid #E4E8EE"}}>

// ─── Reports Tab ──────────────────────────────────────────────────────────────
function ReportsTab({C}){
  const[dateFrom,setDateFrom]=useState("2026-01-01");
  const[dateTo,setDateTo]=useState("2026-06-30");
  const[generating,setGenerating]=useState(false);
  const allTx=MOCK_TRANSACTIONS;
  const filtered=allTx.filter(tx=>{
    const d=new Date(tx.date);
    return d>=new Date(dateFrom)&&d<=new Date(dateTo);
  });
  const totalRev=filtered.reduce((s,t)=>s+t.amount,0);
  const byMethod=filtered.reduce((a,t)=>{a[t.method]=(a[t.method]||0)+t.amount;return a;},{});
  const byCategory={health:6800,travel:15400,dining:578,entertainment:100};
  const monthlyData=[
    {m:"Jan",r:1200},{m:"Feb",r:4500},{m:"Mar",r:2100},{m:"Apr",r:8900},{m:"May",r:22878},{m:"Jun",r:0},
  ];
  const maxR=Math.max(...monthlyData.map(d=>d.r),1);
  const generatePDF=()=>{
    setGenerating(true);
    setTimeout(()=>{
      setGenerating(false);
      const rows=[
        ["PRA LIBRETA - REVENUE REPORT","","","","","",""],
        [`Date Range: ${dateFrom} to ${dateTo}`,"","","","","",""],
        ["","","","","","",""],
        ["Member","Benefit","Partner","Amount","Method","Date","Voucher"],
        ...filtered.map(t=>[t.member,t.benefit,t.partner,`PhP ${t.amount.toLocaleString()}`,t.method,t.date,t.voucher]),
        ["","","","","","",""],
        ["TOTAL REVENUE","","",`PhP ${totalRev.toLocaleString()}`,"","",""],
      ];
      const csv=rows.map(r=>r.map(v=>`"${v}"`).join(",")).join("\n");
      const a=document.createElement("a");
      a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);
      a.download=`pra-libreta-report-${dateFrom}-${dateTo}.csv`;

// ─── Global Search ─────────────────────────────────────────────────────────────
function GlobalSearch({onNavigate,onPurchase,C,lang}){
  const t=useT(lang);
  const[open,setOpen]=useState(false);
  const[q,setQ]=useState("");
  const inputRef=useRef(null);
  useEffect(()=>{if(open)setTimeout(()=>inputRef.current?.focus(),50);},[open]);
  useEffect(()=>{
    const handler=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==="k"){e.preventDefault();setOpen(o=>!o);}if(e.key==="Escape")setOpen(false);};
    window.addEventListener("keydown",handler);return()=>window.removeEventListener("keydown",handler);
  },[]);
  const results=q.trim().length<2?[]:[
    ...BENEFITS.filter(b=>b.title.toLowerCase().includes(q.toLowerCase())||b.partner.toLowerCase().includes(q.toLowerCase())).map(b=>({type:"benefit",icon:b.iconName,color:b.iconColor,title:b.title,sub:b.partner,action:()=>{setOpen(false);setQ("");onNavigate("benefits");}})),
    ...ANNOUNCEMENTS.filter(a=>a.title.toLowerCase().includes(q.toLowerCase())||a.body.toLowerCase().includes(q.toLowerCase())).map(a=>({type:"announcement",icon:"Newspaper",color:"#3498db",title:a.title,sub:a.date,action:()=>{setOpen(false);setQ("");onNavigate("dashboard");}})),
    ...[{id:"health",label:"Health & Wellness"},{id:"travel",label:"Travel & Hotels"},{id:"dining",label:"Food & Dining"},{id:"entertainment",label:"Entertainment"}].filter(c=>c.label.toLowerCase().includes(q.toLowerCase())).map(c=>({type:"category",icon:"Star",color:"#E8730A",title:c.label,sub:"Browse category",action:()=>{setOpen(false);setQ("");onNavigate("benefits",c.id);}})),
  ].slice(0,8);
  if(!open) return(
    <button onClick={()=>setOpen(true)} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>
      <Icon name="Search" size={16} color="white"/>

    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:800,display:"flex",alignItems:"flex-start",justifyContent:"center",paddingTop:80}} onClick={()=>setOpen(false)}>

// ─── Photo Upload (for ID card + profile) ─────────────────────────────────────
function PhotoUpload({value,onChange,size=80,C}){
  const inputRef=useRef(null);
  const handleFile=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement("canvas");
        const MAX=200;
        const scale=Math.min(MAX/img.width,MAX/img.height);
        canvas.width=img.width*scale;
        canvas.height=img.height*scale;
        canvas.getContext("2d").drawImage(img,0,0,canvas.width,canvas.height);
        onChange(canvas.toDataURL("image/jpeg",0.85));
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  };
  return(
    <div style={{position:"relative",width:size,height:size,cursor:"pointer"}} onClick={()=>inputRef.current?.click()}>
      <input ref={inputRef} type="file" accept="image/*" style={{display:"none"}} onChange={handleFile}/>
      {value?(
        <img src={value} alt="Profile" style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:"3px solid #E8730A"}}/>
      ):(
        <div style={{width:size,height:size,borderRadius:"50%",background:C.orangePale,border:"2.5px dashed #E8730A",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4}}>
          <Icon name="UserCircle" size={size*0.4} color="#E8730A"/>
          <span style={{fontSize:9,color:"#E8730A",fontWeight:700,textAlign:"center",lineHeight:1.2}}>TAP TO<br/>UPLOAD</span>
        </div>
      )}
      <div style={{position:"absolute",bottom:0,right:0,width:22,height:22,borderRadius:"50%",background:"#E8730A",border:"2px solid white",display:"flex",alignItems:"center",justifyContent:"center"}}>
        <Icon name="Pencil" size={11} color="white"/>
      </div>
    </div>
  );
}

        <div style={{background:"white",borderRadius:20,padding:"28px 28px 24px",boxShadow:"0 20px 60px rgba(0,0,0,0.3)"}}>

// ─── Profile Completion Tracker ────────────────────────────────────────────────
function ProfileChecklist({member,memberPhoto,purchasedVouchers,claimedIds,lang,onNavigate,C}){
  const tasks=[
    {id:"photo",label:lang==="fil"?"Mag-upload ng larawan":"Upload profile photo",done:!!memberPhoto,action:()=>onNavigate("profile")},
    {id:"lang",label:lang==="fil"?"Itakda ang wika":"Set your language preference",done:lang==="fil",action:()=>onNavigate("profile")},
    {id:"claim",label:lang==="fil"?"I-claim ang unang benepisyo":"Claim your first benefit",done:claimedIds.length>0,action:()=>onNavigate("benefits","health")},
    {id:"purchase",label:lang==="fil"?"Bumili ng unang voucher":"Purchase your first voucher",done:purchasedVouchers.length>0,action:()=>onNavigate("benefits")},
    {id:"id",label:lang==="fil"?"I-download ang ID Card":"Download your digital ID card",done:false,action:()=>onNavigate("profile")},
  ];
  const done=tasks.filter(t=>t.done).length;
  const pct=Math.round((done/tasks.length)*100);
  if(pct===100)return null;
  return(
    <div className="card fade-in" style={{padding:"16px 18px",marginBottom:16,border:`1.5px solid ${C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><Icon name="CheckCircle" size={16} color="#E8730A"/><span style={{fontSize:14,fontWeight:700,color:C.text}}>Complete your profile</span></div>
        <span style={{fontSize:13,fontWeight:700,color:"#E8730A"}}>{done}/{tasks.length}</span>
      </div>
      <div style={{background:C.gray200,borderRadius:6,height:6,overflow:"hidden",marginBottom:12}}>
        <div style={{height:"100%",borderRadius:6,background:"linear-gradient(90deg,#E8730A,#F08030)",width:`${pct}%`,transition:"width 1s ease"}}/>
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:6}}>
        {tasks.map(t=>(
          <div key={t.id} onClick={!t.done?t.action:undefined} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 8px",borderRadius:8,cursor:t.done?"default":"pointer",background:t.done?"transparent":C.gray50,transition:"background .15s"}} onMouseEnter={e=>{if(!t.done)e.currentTarget.style.background=C.orangePale;}} onMouseLeave={e=>e.currentTarget.style.background=t.done?"transparent":C.gray50}>
            <div style={{width:20,height:20,borderRadius:"50%",border:`2px solid ${t.done?"#1A7A4A":"#E8730A"}`,background:t.done?"#1A7A4A":"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{t.done&&<Icon name="Check" size={11} color="white"/>}</div>
            <span style={{fontSize:13,color:t.done?C.textSub:C.text,textDecoration:t.done?"line-through":"none",fontWeight:t.done?400:500}}>{t.label}</span>
            {!t.done&&<Icon name="ChevronRight" size={13} color="#E8730A" style={{marginLeft:"auto"}}/>}
          </div>
        ))}
      </div>
    </div>
  );
}

const FAQ_ITEMS=[
  {q:"What is the PRA Libreta?",a:"PRA Libreta is the official digital benefits platform of the Philippine Retirement Authority. It gives SRRV holders access to exclusive discounts and privileges with partner establishments across health, travel, dining, and entertainment."},
  {q:"How do I use my voucher at a partner establishment?",a:"After purchasing a voucher, go to My Vouchers and expand the voucher card. Show the QR code or reference number to the partner staff. For claimed (free) benefits, simply present your PRA Benefits Card or show the Claimed status on this app."},
  {q:"When does my SRRV need to be renewed?",a:"SRRV holders must pay an annual fee of USD 360 and report to PRA yearly. Your visa itself does not expire as long as annual requirements are met. If your status shows 'Expired', please contact PRA immediately at (02) 8526-3048."},
  {q:"What documents do I need for SRRV renewal?",a:"You will need a valid passport with photocopy, your current ACR I-Card, latest annual fee receipt, a medical certificate issued within 6 months, 2x2 ID photos (white background, 6 copies), and a duly accomplished SRRV Renewal Form."},
  {q:"What is the annual membership fee?",a:"The annual fee for SRRV holders is USD 360. This must be paid directly to PRA at their head office in Makati or any accredited bank. Payment can also be arranged online through the PRA website."},
  {q:"Can I transfer my voucher to another person?",a:"No. PRA Libreta vouchers are non-transferable. They are linked to your PRA membership and can only be used by the registered member. Presenting a voucher purchased by another member will not be honored by partner establishments."},
  {q:"What if a partner establishment refuses to honor my benefit?",a:"Please report the incident to PRA immediately. Call (02) 8526-3048 or email info@pra.gov.ph with the establishment name, date, and details. PRA takes partner compliance seriously and will follow up within 3 business days."},
  {q:"How do PRA Libreta Points work?",a:"You earn 1 point for every PhP 100 spent on purchased vouchers. Once you accumulate 50 points, you can redeem them for PhP 100 off your next purchase. Points never expire as long as your SRRV is active."},
  {q:"Can I use this app offline?",a:"The core features of PRA Libreta work offline once the app is loaded. You can view your vouchers, ID card, and benefits list without an internet connection. Purchasing new vouchers and the AI assistant require a connection."},
  {q:"How do I contact PRA for support?",a:"PRA Head Office: (02) 8526-3048 or (02) 8525-9358. Email: info@pra.gov.ph. Address: Legazpi Towers 300, Roxas Blvd, Pasay City. Office hours: Monday-Friday, 8:00 AM to 5:00 PM. Saturdays: 9:00 AM to 12:00 NN (starting June 15, 2026)."},

// ─── Admin: Member CSV Import ─────────────────────────────────────────────────
function MemberImportModal({onClose,onImport,C}){
  const[file,setFile]=useState(null);
  const[preview,setPreview]=useState([]);
  const[error,setError]=useState("");
  const handleFile=(e)=>{
    const f=e.target.files[0];
    if(!f)return;
    setFile(f);
    const reader=new FileReader();
    reader.onload=(ev)=>{
      const lines=ev.target.result.split("\n").filter(Boolean);
      const headers=lines[0].split(",").map(h=>h.replace(/"/g,"").trim());
      const rows=lines.slice(1,6).map(l=>{
        const vals=l.split(",").map(v=>v.replace(/"/g,"").trim());
        return headers.reduce((o,h,i)=>({...o,[h]:vals[i]||""}),{});
      });
      if(rows.length>0){setPreview(rows);setError("");}
      else setError("No valid rows found in CSV.");
    };
    reader.readAsText(f);
  };
  const doImport=()=>{
    onImport&&onImport(preview.length);
    onClose();
    alert(`${preview.length} member(s) imported successfully (demo).`);
  };
  const downloadTemplate=()=>{
    const csv=["First Name,Last Name,Email,PRA ID,Age,City,Province,Mobile,Status","Maria,Santos,maria@example.com,SRRV-2024-001,65,Makati,Metro Manila,09171234567,Active"].join("\n");
    const a=document.createElement("a");a.href="data:text/csv;charset=utf-8,"+encodeURIComponent(csv);a.download="pra_members_template.csv";a.click();
  };
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.55)",zIndex:800,display:"flex",alignItems:"center",justifyContent:"center",padding:20}} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} className="slide-up" style={{background:"white",borderRadius:20,width:"100%",maxWidth:480,padding:"0 0 24px",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{background:"linear-gradient(135deg,#0A2540,#1E4D7B)",padding:"18px 22px",borderRadius:"20px 20px 0 0",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:16,fontWeight:700,color:"white"}}>Bulk Member Import</div>
          <button onClick={onClose} style={{background:"rgba(255,255,255,0.15)",border:"none",borderRadius:"50%",width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><Icon name="X" size={14} color="white"/></button>
        </div>
        <div style={{padding:"20px 22px"}}>
          <div style={{background:"#F8F9FA",border:"1px solid #E4E8EE",borderRadius:10,padding:"14px",marginBottom:16,display:"flex",gap:10,alignItems:"flex-start"}}>
            <Icon name="Info" size={16} color="#3498db"/>
            <div style={{fontSize:13,color:"#2D3748",lineHeight:1.6}}>Upload a CSV file with member data. Download the template below to ensure correct column formatting.</div>
          </div>
          <button onClick={downloadTemplate} className="btn-ghost" style={{width:"100%",marginBottom:16,fontSize:13}}><Icon name="Download" size={14} color="currentColor"/> Download CSV Template</button>
          <label style={{display:"block",border:"2px dashed #E4E8EE",borderRadius:12,padding:"24px",textAlign:"center",cursor:"pointer",marginBottom:16,background:file?"#F0FDF4":"#FAFAFA",borderColor:file?"#1A7A4A":"#E4E8EE",transition:"all .2s"}}>
            <input type="file" accept=".csv" style={{display:"none"}} onChange={handleFile}/>
            <div style={{marginBottom:8,opacity:.5}}><Icon name="FileText" size={32} color={file?"#1A7A4A":"#4A5568"}/></div>
            <div style={{fontSize:14,fontWeight:600,color:file?"#1A7A4A":"#2D3748"}}>{file?file.name:"Click to upload CSV file"}</div>
            <div style={{fontSize:12,color:"#9AA5B4",marginTop:4}}>Supports .csv format up to 500 members</div>
          </label>
          {error&&<div style={{color:"#C0392B",fontSize:13,marginBottom:12}}>{error}</div>}
          {preview.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{fontSize:13,fontWeight:700,color:"#2D3748",marginBottom:8}}>Preview (first {preview.length} rows):</div>
              <div style={{overflowX:"auto",borderRadius:8,border:"1px solid #E4E8EE"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead><tr style={{background:"#F8F9FA"}}>{Object.keys(preview[0]).slice(0,4).map(h=><th key={h} style={{padding:"7px 10px",textAlign:"left",color:"#4A5568",fontWeight:700,borderBottom:"1px solid #E4E8EE"}}>{h}</th>)}</tr></thead>
                  <tbody>{preview.map((row,i)=><tr key={i} style={{borderBottom:"1px solid #F0F0F0"}}>{Object.values(row).slice(0,4).map((v,j)=><td key={j} style={{padding:"6px 10px",color:"#2D3748"}}>{v}</td>)}</tr>)}</tbody>
                </table>
              </div>
            </div>
          )}
          <div style={{display:"flex",gap:10}}>
            <button className="btn-ghost" style={{flex:1}} onClick={onClose}>Cancel</button>
            <button className="btn-primary" style={{flex:1}} disabled={!preview.length} onClick={doImport}><Icon name="Users" size={14} color="white"/> Import {preview.length||""} Members</button>
          </div>
        </div>
      </div>
    </div>
  );
}

  const txns=MOCK_TRANSACTIONS.filter(t=>t.member===MOCK_MEMBERS.find(m=>m.praId===praId)?.firstName+" "+MOCK_MEMBERS.find(m=>m.praId===praId)?.lastName);
  if(txns.length===0)return null;
  const byCat=txns.reduce((a,t)=>{const b=BENEFITS.find(x=>x.title===t.benefit);if(b)a[b.category]=(a[b.category]||0)+t.amount;return a;},{});
  const catColors={health:"#e74c3c",travel:"#3498db",dining:"#27ae60",entertainment:"#9b59b6"};
  const total=Object.values(byCat).reduce((a,b)=>a+b,0);
  return(
    <div style={{marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:700,color:"#4A5568",textTransform:"uppercase",letterSpacing:.5,marginBottom:8}}>Spending by Category</div>
      <div style={{display:"flex",gap:6,height:48,alignItems:"flex-end",marginBottom:8}}>
        {Object.entries(byCat).map(([cat,amt])=>(
          <div key={cat} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
            <div style={{width:"100%",borderRadius:"3px 3px 0 0",background:catColors[cat]||"#E8730A",height:`${Math.max(8,(amt/total)*44)}px`,transition:"height .5s"}} title={`PhP ${amt.toLocaleString()}`}/>
            <span style={{fontSize:9,color:"#4A5568",textTransform:"capitalize"}}>{cat.slice(0,4)}</span>
          </div>
        ))}
      </div>
      <div style={{fontSize:12,color:"#4A5568"}}>Preferred: <strong style={{color:Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0]?catColors[Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0][0]]:"#E8730A"}}>{Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0]?.[0]||" - "}</strong></div>
    </div>
  );
}

// ─── Review Stars Interactive ─────────────────────────────────────────────────
function ReviewStars({value,onChange,size=24,readonly=false}){
  const[hover,setHover]=useState(0);
  return(
    <div style={{display:"flex",gap:4}}>
      {[1,2,3,4,5].map(s=>(
        <button key={s}
          onClick={()=>!readonly&&onChange&&onChange(s)}
          onMouseEnter={()=>!readonly&&setHover(s)}
          onMouseLeave={()=>!readonly&&setHover(0)}
          style={{background:"none",border:"none",cursor:readonly?"default":"pointer",fontSize:size,lineHeight:1,padding:0,color:s<=(hover||value)?"#E8730A":"#D0D5DD",transition:"color .15s"}}>
          ★
        </button>
      ))}
    </div>
  );
}

// ─── Single Review Card ───────────────────────────────────────────────────────
function ReviewCard({review,C}){
  const[helpful,setHelpful]=useState(review.helpful);
  const[voted,setVoted]=useState(false);
  return(
    <div style={{padding:"14px 0",borderBottom:`1px solid ${C.border}`}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:32,height:32,borderRadius:"50%",background:C.orangePale,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#E8730A",flexShrink:0}}>{review.author[0]}</div>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:6}}>
              <span style={{fontSize:13,fontWeight:700,color:C.text}}>{review.author}</span>
              {review.verified&&<span style={{fontSize:10,background:"rgba(26,122,74,0.1)",color:"#1A7A4A",borderRadius:20,padding:"1px 6px",fontWeight:600}}>Verified</span>}
            </div>
            <div style={{fontSize:11,color:C.textSub}}>{review.date}</div>
          </div>
        </div>
        <ReviewStars value={review.rating} readonly size={14}/>
      </div>
      <p style={{fontSize:13,color:C.textSub,lineHeight:1.65,margin:"0 0 8px 0"}}>{review.comment}</p>
      <button onClick={()=>{if(!voted){setHelpful(h=>h+1);setVoted(true);}}} style={{background:"none",border:`1px solid ${C.border}`,borderRadius:6,padding:"4px 10px",fontSize:11,color:voted?"#1A7A4A":C.textSub,cursor:voted?"default":"pointer",display:"flex",alignItems:"center",gap:4,transition:"all .2s"}}>
        <span>{voted?"✓":"👍"}</span> Helpful ({helpful})
      </button>
    </div>
  );
}

      rating,
      comment:comment.trim(),
      date:new Date().toLocaleDateString("en-PH",{year:"numeric",month:"long",day:"numeric"}),
      helpful:0,
      verified:true,
    };
    onSubmit&&onSubmit(newReview);
    setSubmitted(true);
  };
  if(submitted)return(
    <div style={{background:"rgba(26,122,74,0.08)",border:"1.5px solid #1A7A4A",borderRadius:12,padding:"16px",textAlign:"center"}}>
      <div style={{fontSize:22,marginBottom:6}}>🎉</div>
      <div style={{fontSize:14,fontWeight:700,color:"#1A7A4A",marginBottom:4}}>Thank you for your review!</div>
      <div style={{fontSize:13,color:C.textSub}}>Your feedback helps other PRA members make informed decisions.</div>
    </div>
  );
  return(
    <div style={{background:C.gray50,borderRadius:12,padding:"16px",border:`1px solid ${C.border}`}}>
      <div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:12}}>Write a Review</div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:12,color:C.textSub,marginBottom:6}}>Your Rating</div>
        <ReviewStars value={rating} onChange={setRating} size={28}/>
      </div>
      <div style={{marginBottom:10}}>
        <div style={{fontSize:12,color:C.textSub,marginBottom:6}}>Your Experience</div>
        <textarea value={comment} onChange={e=>setComment(e.target.value)} placeholder="Share your experience with this benefit... (min. 10 characters)" style={{width:"100%",padding:"10px 12px",border:`1.5px solid ${error?'#C0392B':C.border}`,borderRadius:8,fontSize:13,color:C.text,background:C.surface,resize:"vertical",minHeight:80,outline:"none",fontFamily:"inherit",boxSizing:"border-box"}}/>
      </div>
      {error&&<div style={{fontSize:12,color:"#C0392B",marginBottom:8,display:"flex",alignItems:"center",gap:4}}><Icon name="AlertCircle" size={12} color="#C0392B"/>{error}</div>}
      <button className="btn-primary" style={{width:"100%",fontSize:13}} onClick={handleSubmit}><Icon name="Star" size={13} color="white"/> Submit Review</button>
    </div>
  );
}

// ─── Reviews Section (used inside BenefitModal) ───────────────────────────────
function ReviewsSection({item,member,C}){
  const[reviews,setReviews]=useState(MOCK_REVIEWS[item.id]||[]);
  const[showWrite,setShowWrite]=useState(false);
  const[sortBy,setSortBy]=useState("recent");
  const avgRating=reviews.length?reviews.reduce((s,r)=>s+r.rating,0)/reviews.length:item.avgRating||0;
  const ratingDist=[5,4,3,2,1].map(s=>({stars:s,count:reviews.filter(r=>r.rating===s).length}));
  const sorted=[...reviews].sort((a,b)=>sortBy==="helpful"?b.helpful-a.helpful:new Date(b.date)-new Date(a.date));
  const alreadyReviewed=reviews.some(r=>r.praId===member?.praId);
  return(
    <div>
      {/* Rating summary */}
      <div style={{display:"flex",gap:20,alignItems:"center",padding:"16px 0",borderBottom:`1px solid ${C.border}`,marginBottom:16}}>
        <div style={{textAlign:"center",flexShrink:0}}>
          <div style={{fontSize:40,fontWeight:800,color:C.text,lineHeight:1}}>{avgRating.toFixed(1)}</div>
          <ReviewStars value={Math.round(avgRating)} readonly size={14}/>
          <div style={{fontSize:11,color:C.textSub,marginTop:2}}>{reviews.length} review{reviews.length!==1?"s":""}</div>
        </div>
        <div style={{flex:1}}>
          {ratingDist.map(({stars,count})=>(
            <div key={stars} style={{display:"flex",alignItems:"center",gap:6,marginBottom:3}}>
              <span style={{fontSize:11,color:C.textSub,width:8}}>{stars}</span>
              <span style={{fontSize:11,color:"#E8730A"}}>★</span>
              <div style={{flex:1,height:6,background:C.gray200,borderRadius:3,overflow:"hidden"}}>
                <div style={{height:"100%",background:"#E8730A",borderRadius:3,width:reviews.length?`${(count/reviews.length)*100}%`:"0%",transition:"width .5s"}}/>
              </div>
              <span style={{fontSize:11,color:C.textSub,width:16,textAlign:"right"}}>{count}</span>
            </div>
          ))}
        </div>
      </div>
      {/* Sort + write */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{display:"flex",gap:6}}>
          {["recent","helpful"].map(s=>(
            <button key={s} onClick={()=>setSortBy(s)} style={{background:sortBy===s?"#0A2540":C.surface,color:sortBy===s?"white":C.textSub,border:`1.5px solid ${sortBy===s?"#0A2540":C.border}`,borderRadius:6,padding:"5px 10px",fontSize:12,fontWeight:600,cursor:"pointer",textTransform:"capitalize"}}>{s}</button>
          ))}
        </div>
        {!alreadyReviewed&&member&&<button onClick={()=>setShowWrite(s=>!s)} style={{background:"none",border:"1.5px solid #E8730A",borderRadius:6,padding:"5px 12px",fontSize:12,fontWeight:700,color:"#E8730A",cursor:"pointer"}}>{showWrite?"Cancel":"+ Write Review"}</button>}
        {alreadyReviewed&&<span style={{fontSize:12,color:"#1A7A4A",fontWeight:600}}>✓ You reviewed this</span>}
      </div>
      {showWrite&&<div style={{marginBottom:16}}><WriteReviewForm benefitId={item.id} member={member} onSubmit={r=>{setReviews(rs=>[r,...rs]);setShowWrite(false);}} C={C}/></div>}
      {/* Review list */}
      {sorted.length===0?<div style={{textAlign:"center",padding:"24px",color:C.textSub,fontSize:13}}>No reviews yet. Be the first to share your experience!</div>
      :<div>{sorted.map(r=><ReviewCard key={r.id} review={r} C={C}/>)}</div>}
    </div>
  );
}

// ─── Partner Store Overview Card ──────────────────────────────────────────────
function PartnerOverview({partnerName,C}){
  const info=PARTNER_INFO[partnerName];
  if(!info)return null;
  return(
    <div style={{background:C.gray50,borderRadius:12,padding:"16px",border:`1px solid ${C.border}`,marginBottom:16}}>
      <div style={{fontSize:13,fontWeight:700,color:C.textSub,textTransform:"uppercase",letterSpacing:.5,marginBottom:10}}>About the Partner</div>
      <div style={{display:"flex",gap:12,alignItems:"flex-start",marginBottom:12}}>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:4}}>{partnerName}</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:8}}>
            <span style={{fontSize:11,color:C.textSub,background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"2px 8px"}}>{info.type}</span>
            {info.founded&&<span style={{fontSize:11,color:C.textSub,background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"2px 8px"}}>Est. {info.founded}</span>}
            {info.branches&&<span style={{fontSize:11,color:C.textSub,background:C.surface,border:`1px solid ${C.border}`,borderRadius:6,padding:"2px 8px"}}>{info.branches}+ branches</span>}
          </div>
          <p style={{fontSize:13,color:C.textSub,lineHeight:1.65,margin:0}}>{info.about}</p>
        </div>
      </div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
        {info.highlights.map((h,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(26,122,74,0.08)",borderRadius:6,padding:"4px 8px"}}>
            <Icon name="Check" size={10} color="#1A7A4A"/>
            <span style={{fontSize:11,color:"#1A7A4A",fontWeight:600}}>{h}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function App(){
  const[view,setView]=useState("dashboard"); // PRA Libreta
  const[mode,setMode]=useState("member");
  const[member,setMember]=useState(null);
  const[selectedBenefit,setSelectedBenefit]=useState(null);
  const[successResult,setSuccessResult]=useState(null);
  const[benefitCategory,setBenefitCategory]=useState("all");
  const[claimedIds,setClaimedIds]=useState([]);
  const[purchasedVouchers,setPurchasedVouchers]=useState([]);
  const[notifOpen,setNotifOpen]=useState(false);
  const[readNotifs,setReadNotifs]=useState([]);
  const[ratings,setRatings]=useState({});
  const[darkMode,setDarkMode]=useState(false);
  const[lang,setLang]=useState("en");
  const[showTour,setShowTour]=useState(false);
  const[modalBenefit,setModalBenefit]=useState(null);
  const[showChat,setShowChat]=useState(false);
  const[showRenewal,setShowRenewal]=useState(false);
  const[pushAsked,setPushAsked]=useState(false);
  const[points,setPoints]=useState(0);
  const[showIDCard,setShowIDCard]=useState(false);
  const[bookingDates,setBookingDates]=useState({});
  const[memberPhoto,setMemberPhoto]=useState(null);
  const[selectedAdminMember,setSelectedAdminMember]=useState(null);
  const[appScreen,setAppScreen]=useState("login");
  const[receiptVoucher,setReceiptVoucher]=useState(null);
  const[showSplash,setShowSplash]=useState(true);
  const[showWhatsNew,setShowWhatsNew]=useState(false);
  const[showDemoMode,setShowDemoMode]=useState(false);
  const[favorites,setFavorites]=useState([]);
  const[showImport,setShowImport]=useState(false);
  const C=getC(darkMode);
  useEffect(()=>{document.body.style.background=C.bg;},[darkMode]);
  const nav=(page,cat="all")=>{setBenefitCategory(cat);setView(page);setNotifOpen(false);window.scrollTo({top:0,behavior:"smooth"});};
  const purchase=(item)=>{setSelectedBenefit(item);setView("checkout");window.scrollTo({top:0,behavior:"smooth"});};
  const paySuccess=(result)=>{
    setSuccessResult(result);
    const vr={id:result.voucher,benefit:result.item.title,partner:result.item.partner,iconName:result.item.iconName,iconColor:result.item.iconColor,amount:result.amount,payMethod:result.payMethod,date:new Date().toLocaleDateString("en-PH",{year:"numeric",month:"long",day:"numeric"}),validity:result.item.voucherValidity,status:"active",category:result.item.category};
    setPurchasedVouchers(vs=>[vr,...vs]);
    setPoints(p=>p+calcPoints(result.amount));
    setView("success");window.scrollTo({top:0,behavior:"smooth"});
  };
  const claim=(item)=>setClaimedIds(ids=>[...ids,item.id]);
  const toggleDark=()=>setDarkMode(d=>!d);
  const handleLogout=()=>{setMember(null);setAppScreen("login");setView("dashboard");setPurchasedVouchers([]);setClaimedIds([]);setPoints(0);setFavorites([]);setRatings({});setMemberPhoto(null);setShowWhatsNew(false);setShowTour(false);setReadNotifs([]);};
  const activeNav=["checkout","success"].includes(view)?"benefits":["faq"].includes(view)?"faq":["history"].includes(view)?"vouchers":view;
  return(
    <>
      {showSplash&&<SplashScreen onDone={()=>{setShowSplash(false);}}/>}
      {appScreen==="login"&&!member&&<LoginPage onLogin={data=>{setMember(data);setAppScreen("app");setShowTour(false);setShowWhatsNew(true);if(!pushAsked){setPushAsked(true);requestPushNotif(data.firstName);}}} onRegister={()=>setAppScreen("register")} C={C}/>}
      {appScreen==="register"&&!member&&<RegistrationPage onComplete={data=>{setMember(data);setAppScreen("app");setView("dashboard");setShowTour(true);setShowWhatsNew(true);if(!pushAsked){setPushAsked(true);requestPushNotif(data.firstName);}}} C={C} onBack={()=>setAppScreen("login")}/>}
      {receiptVoucher&&member&&<ReceiptModal voucher={receiptVoucher} member={member} C={C} onClose={()=>setReceiptVoucher(null)}/>}
      {showWhatsNew&&<WhatsNewModal onClose={()=>setShowWhatsNew(false)} C={C}/>}
      {showDemoMode&&<DemoWalkthrough onClose={()=>setShowDemoMode(false)} onNavigate={nav} C={C}/>}
      {showImport&&<MemberImportModal onClose={()=>setShowImport(false)} onImport={n=>console.log("Imported",n)} C={C}/>}
      {appScreen==="app"&&showTour&&member&&<OnboardingTour member={member} onDone={()=>setShowTour(false)} C={C}/>}
      {appScreen==="app"&&modalBenefit&&<BenefitModal item={modalBenefit} onClose={()=>setModalBenefit(null)} onPurchase={purchase} onClaim={claim} claimed={claimedIds.includes(modalBenefit.id)} C={C} member={member}/>}
      {appScreen==="app"&&member&&mode==="member"&&(
        <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}}>
          <NavBar active={activeNav} onNavigate={nav} memberName={member.firstName} C={C} notifOpen={notifOpen} setNotifOpen={setNotifOpen} readNotifs={readNotifs} setReadNotifs={setReadNotifs} announcements={ANNOUNCEMENTS} lang={lang} onNavigateFn={nav}/>
          <div style={{maxWidth:640,margin:"0 auto"}}>
            {view==="dashboard"&&<Dashboard member={member} onNavigate={nav} onPurchase={purchase} onClaim={claim} claimedIds={claimedIds} benefits={ALL_BENEFITS} announcements={ANNOUNCEMENTS} C={C} purchasedVouchers={purchasedVouchers} onOpenModal={setModalBenefit} onRenew={()=>setShowRenewal(true)} points={points} onShowID={()=>setShowIDCard(true)} lang={lang} memberPhoto={memberPhoto}/>}
            {view==="benefits"&&<BenefitsHub member={member} initialCategory={benefitCategory} onPurchase={purchase} C={C} onOpenModal={setModalBenefit} favorites={favorites} setFavorites={setFavorites} claimedIds={claimedIds} onClaim={claim}/>}
            {view==="checkout"&&selectedBenefit&&<CheckoutPage item={selectedBenefit} member={member} onSuccess={paySuccess} onBack={()=>setView("benefits")} C={C} bookingDates={bookingDates} setBookingDates={setBookingDates}/>}
            {view==="success"&&successResult&&<PaymentSuccess result={successResult} member={member} onDone={()=>{setView("benefits");window.scrollTo({top:0});}} onViewVouchers={()=>{setView("vouchers");window.scrollTo({top:0});}} onRate={(id,stars)=>setRatings(r=>({...r,[id]:stars}))} C={C}/>}
            {view==="profile"&&<ProfilePage member={member} onSwitchToAdmin={()=>setMode("admin")} darkMode={darkMode} toggleDark={toggleDark} C={C} purchasedVouchers={purchasedVouchers} claimedIds={claimedIds} lang={lang} setLang={setLang} points={points} onShowID={()=>setShowIDCard(true)} memberPhoto={memberPhoto} setMemberPhoto={setMemberPhoto} onLogout={handleLogout}/>}
            {view==="vouchers"&&<MyVouchersPage member={member} purchasedVouchers={purchasedVouchers} claimedIds={claimedIds} ratings={ratings} setRatings={setRatings} C={C} onNavigate={nav} onViewReceipt={setReceiptVoucher} onShowHistory={()=>nav("history")}/>}
            {view==="faq"&&<FAQPage C={C} lang={lang}/>}
            {view==="history"&&<PaymentHistoryPage purchasedVouchers={purchasedVouchers} C={C} onViewReceipt={setReceiptVoucher}/>}
          </div>
        </div>
      )}
      {appScreen==="app"&&member&&mode==="member"&&(
        <>
          {/* Demo walkthrough toggle */}
          <button onClick={()=>setShowDemoMode(d=>!d)} style={{position:"fixed",bottom:156,right:16,zIndex:250,width:42,height:42,borderRadius:"50%",background:"#0A2540",border:"2px solid rgba(255,255,255,0.15)",boxShadow:"0 2px 10px rgba(0,0,0,0.3)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .3s"}} title="Demo Guide">
            <Icon name="Info" size={17} color="rgba(255,255,255,0.8)"/>
          </button>
          {/* Floating chat button */}
          <button onClick={()=>setShowChat(c=>!c)} style={{position:"fixed",bottom:90,right:16,zIndex:250,width:52,height:52,borderRadius:"50%",background:showChat?"#0A2540":"#E8730A",border:"none",boxShadow:"0 4px 16px rgba(232,115,10,0.4)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",transition:"all .3s"}}>
            <Icon name={showChat?"X":"Sparkles"} size={22} color="white"/>
          </button>
          {showChat&&<ChatBot member={member} C={C} onClose={()=>setShowChat(false)}/>}
          {showRenewal&&<RenewalWizard member={member} C={C} onClose={()=>setShowRenewal(false)}/>}
          {showIDCard&&<IDCardModal member={member} C={C} onClose={()=>setShowIDCard(false)} memberPhoto={memberPhoto}/>}
        </>
      )}
      {appScreen==="app"&&mode==="admin"&&member&&<AdminPanel onSwitchToMember={()=>setMode("member")} darkMode={darkMode} toggleDark={toggleDark} C={C} ratings={ratings} memberData={member} onLogout={handleLogout}/>}
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);



















</script>
</body>
</html>

// Lucide icon wrapper - renders SVG from lucide UMD bundle
function Icon({name,size=16,color="currentColor"}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!window.lucide)return;
    const key=name.charAt(0).toLowerCase()+name.slice(1).replace(/([A-Z])/g,'-$1').toLowerCase().replace(/^./,c=>c.toUpperCase()).replace(/-([a-z])/g,(m,c)=>c.toUpperCase());
    const fn=window.lucide[name]||window.lucide[key];
    if(!fn)return;
    ref.current.innerHTML="";
    const [tag,attrs,children]=fn;
    const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
    const merged={...attrs,width:size,height:size};
    if(color!=="currentColor")merged.stroke=color;
    Object.entries(merged).forEach(([k,v])=>svg.setAttribute(k,v));
    svg.style.flexShrink="0";svg.style.display="inline-block";svg.style.verticalAlign="middle";
    (children||[]).forEach(([ct,ca])=>{
      const el=document.createElementNS("http://www.w3.org/2000/svg",ct);
      Object.entries(ca).forEach(([k,v])=>el.setAttribute(k,v));
      svg.appendChild(el);
    });
    ref.current.appendChild(svg);
  },[name,size,color]);
  return <span ref={ref} style={{display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0,width:size,height:size}}/>;
}

  const set=(k,v)=>{setForm(f=>({...f,[k]:v}));if(errors[k])setErrors(e=>({...e,[k]:""}));};
  const v1=()=>{const e={};if(!form.firstName.trim())e.firstName="First name is required.";if(!form.lastName.trim())e.lastName="Last name is required.";if(!form.dob)e.dob="Date of birth is required.";else{const age=Math.floor((Date.now()-new Date(form.dob))/(1000*60*60*24*365.25));if(age<60)e.dob=`You must be at least 60 years old. Calculated age: ${age}.`;}if(!form.province.trim())e.province="Province is required.";if(!form.city.trim())e.city="City/Municipality is required.";if(!form.mobile.trim())e.mobile="Mobile number is required.";else if(!/^(09|\+639)\d{9}$/.test(form.mobile.replace(/\s/g,"")))e.mobile="Enter a valid PH mobile number (e.g. 09171234567).";setErrors(e);return Object.keys(e).length===0;};
  const v2=()=>{const e={};if(!form.praId.trim())e.praId="PRA ID Number is required.";else if(form.praId.trim().length<6)e.praId="PRA ID must be at least 6 characters.";setErrors(e);return Object.keys(e).length===0;};
  const v3=()=>{const e={};if(!form.email.trim())e.email="Email is required.";else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(form.email))e.email="Enter a valid email address.";if(!form.password)e.password="Password is required.";else if(form.password.length<8)e.password="Password must be at least 8 characters.";if(form.password!==form.confirmPassword)e.confirmPassword="Passwords do not match.";setErrors(e);return Object.keys(e).length===0;};
  const next=()=>{let ok=false;if(step===1)ok=v1();if(step===2)ok=v2();if(step===3){ok=v3();if(ok){const age=Math.floor((Date.now()-new Date(form.dob))/(1000*60*60*24*365.25));onComplete({...form,age,praId:form.praId.trim().toUpperCase()});return;}}if(ok)setStep(s=>s+1);};
  const STEPS=["Personal Details","PRA Information","Account Setup"];

            </div>

            <div className="card fade-in" style={{padding:"24px 28px"}}>
              <div style={{marginBottom:18}}><label className="form-label">Email Address</label><input type="email" className={`form-input${errors.email?" error":""}`} value={form.email} onChange={e=>set("email",e.target.value)} placeholder="yourname@email.com"/><Err field="email"/></div>

              {step<3?<>Continue <Icon name="ChevronRight" size={16} color="white"/></>:<><Icon name="CheckCircle" size={16} color="white"/> Complete Registration</>}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
                    <IR label="Title *" value={nb.title} onChange={v=>setNb(b=>({...b,title:v}))} placeholder="Benefit title"/>
                    <IR label="Partner *" value={nb.partner} onChange={v=>setNb(b=>({...b,partner:v}))} placeholder="Partner name"/>
                    <div><label className="form-label">Category</label><select className="form-input" value={nb.category} onChange={e=>setNb(b=>({...b,category:e.target.value}))}><option value="health">Health & Wellness</option><option value="travel">Travel & Hotels</option><option value="dining">Food & Dining</option><option value="entertainment">Entertainment</option></select></div>
                    <div><label className="form-label">Type</label><select className="form-input" value={nb.type} onChange={e=>setNb(b=>({...b,type:e.target.value}))}><option value="purchase">Purchase</option><option value="claim">Claim (Free)</option></select></div>
                    <IR label="Location" value={nb.location} onChange={v=>setNb(b=>({...b,location:v}))} placeholder="e.g. All branches nationwide"/>
                    <IR label="Tag" value={nb.tag} onChange={v=>setNb(b=>({...b,tag:v}))} placeholder="e.g. 20% off for PRA Members"/>
                    <IR label="Original Price" value={nb.originalPrice} onChange={v=>setNb(b=>({...b,originalPrice:v}))} placeholder="e.g. 8500" type="number"/>
                    <IR label="Discount %" value={nb.discountPct} onChange={v=>setNb(b=>({...b,discountPct:v}))} placeholder="e.g. 20" type="number"/>
                  </div>
                  <div style={{marginBottom:14}}><label className="form-label">Description</label><textarea className="form-input" value={nb.description} onChange={e=>setNb(b=>({...b,description:e.target.value}))} placeholder="Full benefit description..." rows={3} style={{resize:"vertical"}}/></div>
                  <IR label="Voucher Validity" value={nb.voucherValidity} onChange={v=>setNb(b=>({...b,voucherValidity:v}))} placeholder="e.g. Valid until December 31, 2026"/>
                  <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                    <button className="btn-ghost" onClick={()=>{setShowAddBenefit(false);setEditingId(null);}}>Cancel</button>
                    <button className="btn-primary" onClick={saveBenefit}><Icon name="Check" size={15} color="white"/> {editingId?"Save Changes":"Add Benefit"}</button>
                  </div>
                </div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {benefits.map(b=>(
                  <div key={b.id} className="card" style={{padding:"14px 18px"}}>
                    <div style={{display:"flex",gap:12,alignItems:"center"}}>
                      <div style={{width:40,height:40,borderRadius:10,background:C.orangePale,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Icon name={b.iconName} size={18} color={b.iconColor}/></div>
                      <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:C.text}}>{b.title}</div><div style={{fontSize:13,color:"#E8730A"}}>{b.partner}</div><div style={{fontSize:12,color:C.textSub}}>{b.categoryLabel}</div></div>
                      <div style={{display:"flex",gap:8,alignItems:"center"}}>
                        <StatusBadge type={b.type==="purchase"?"orange":"green"}>{b.type}</StatusBadge>
                        <button onClick={()=>{setEditingId(b.id);setNb({title:b.title,partner:b.partner,category:b.category,location:b.location||"",description:b.description||"",originalPrice:b.originalPrice||"",discountPct:b.discountPct||"",tag:b.tag||"",type:b.type,voucherValidity:b.voucherValidity||""});setShowAddBenefit(true);}} style={{background:"none",border:"none",color:C.textSub,cursor:"pointer",padding:6}}><Icon name="Pencil" size={15} color={C.textSub}/></button>
                        <button onClick={()=>setBenefits(bs=>bs.filter(x=>x.id!==b.id))} style={{background:"none",border:"none",color:"#C0392B",cursor:"pointer",padding:6}}><Icon name="Trash2" size={15} color="#C0392B"/></button>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {activeTab==="announcements"&&(
            <div className="fade-in">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                <div style={{fontSize:20,fontWeight:700,color:C.text,fontFamily:"'Libre Baskerville',serif"}}>Announcements</div>
                <button className="btn-primary" style={{fontSize:13,padding:"9px 16px",minHeight:38}} onClick={()=>setShowAddAnn(true)}><Icon name="Plus" size={15} color="white"/> Add Announcement</button>
              </div>
              {showAddAnn&&(
                <div className="card fade-in" style={{padding:"20px 22px",marginBottom:18,border:"2px solid #E8730A"}}>
                  <div style={{fontSize:15,fontWeight:700,color:C.text,marginBottom:14}}>New Announcement</div>
                  <IR label="Title *" value={na.title} onChange={v=>setNa(a=>({...a,title:v}))} placeholder="Announcement title"/>
                  <div style={{marginBottom:14}}><label className="form-label">Body *</label><textarea className="form-input" value={na.body} onChange={e=>setNa(a=>({...a,body:e.target.value}))} placeholder="Announcement content..." rows={3} style={{resize:"vertical"}}/></div>
                  <div style={{marginBottom:16}}><label className="form-label">Type</label><select className="form-input" value={na.type} onChange={e=>setNa(a=>({...a,type:e.target.value}))}><option value="info">Info</option><option value="new">New</option><option value="reminder">Reminder</option></select></div>
                  <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}>
                    <button className="btn-ghost" onClick={()=>setShowAddAnn(false)}>Cancel</button>
                    <button className="btn-primary" onClick={saveAnn}><Icon name="Check" size={15} color="white"/> Post Announcement</button>
                  </div>
                </div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {announcements.map(ann=>(
                  <div key={ann.id} className="card" style={{padding:"14px 18px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:6}}>
                      <div style={{fontSize:14,fontWeight:700,color:C.text}}>{ann.title}</div>
                      <div style={{display:"flex",gap:8,alignItems:"center",flexShrink:0}}><AnnBadge type={ann.type}/><button onClick={()=>setAnnouncements(as=>as.filter(a=>a.id!==ann.id))} style={{background:"none",border:"none",color:"#C0392B",cursor:"pointer",padding:4}}><Icon name="Trash2" size={14} color="#C0392B"/></button></div>
                    </div>
                    <div style={{fontSize:13,color:C.textSub,lineHeight:1.6,marginBottom:4}}>{ann.body}</div>
                    <div style={{fontSize:11,color:C.textSub,display:"flex",alignItems:"center",gap:4}}><Icon name="Clock" size={11} color={C.textSub}/> {ann.date}</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function App(){
  const[view,setView]=useState("register");
  const[mode,setMode]=useState("member");
  const[member,setMember]=useState(null);
  const[selectedBenefit,setSelectedBenefit]=useState(null);
  const[successResult,setSuccessResult]=useState(null);
  const[benefitCategory,setBenefitCategory]=useState("all");
  const[claimedIds,setClaimedIds]=useState([]);
  const[darkMode,setDarkMode]=useState(false);
  const C=getC(darkMode);
  useEffect(()=>{document.body.className=darkMode?"dark":"light";},[darkMode]);
  const nav=(page,cat="all")=>{setBenefitCategory(cat);setView(page);window.scrollTo({top:0,behavior:"smooth"});};
  const purchase=(item)=>{setSelectedBenefit(item);setView("checkout");window.scrollTo({top:0,behavior:"smooth"});};
  const paySuccess=(result)=>{setSuccessResult(result);setView("success");window.scrollTo({top:0,behavior:"smooth"});};
  const claim=(item)=>setClaimedIds(ids=>[...ids,item.id]);
  const toggleDark=()=>setDarkMode(d=>!d);
  return(
    <>
      {view==="register"&&<RegistrationPage onComplete={data=>{setMember(data);setView("dashboard");}} C={C}/>}
      {view!=="register"&&member&&mode==="member"&&(
        <div style={{paddingBottom:80,background:C.bg,minHeight:"100vh"}}>
          <NavBar active={["checkout","success"].includes(view)?"benefits":view} onNavigate={nav} memberName={member.firstName} C={C}/>
          <div style={{maxWidth:640,margin:"0 auto"}}>
            {view==="dashboard"&&<Dashboard member={member} onNavigate={nav} onPurchase={purchase} onClaim={claim} claimedIds={claimedIds} benefits={BENEFITS} announcements={ANNOUNCEMENTS} C={C}/>}
            {view==="benefits"&&<BenefitsHub member={member} initialCategory={benefitCategory} onPurchase={purchase} C={C}/>}
            {view==="checkout"&&selectedBenefit&&<CheckoutPage item={selectedBenefit} member={member} onSuccess={paySuccess} onBack={()=>setView("benefits")} C={C}/>}
            {view==="success"&&successResult&&<PaymentSuccess result={successResult} member={member} onDone={()=>{setView("benefits");window.scrollTo({top:0});}} C={C}/>}
            {view==="profile"&&<ProfilePage member={member} onSwitchToAdmin={()=>setMode("admin")} darkMode={darkMode} toggleDark={toggleDark} C={C}/>}
          </div>
        </div>
      )}
      {mode==="admin"&&member&&<AdminPanel onSwitchToMember={()=>setMode("member")} darkMode={darkMode} toggleDark={toggleDark} C={C}/>}
    </>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
